name: Build Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/extension

      - name: Build & zip Chrome
        run: npm run zip
        working-directory: apps/extension

      - name: Build & zip Firefox
        run: npm run zip:firefox
        working-directory: apps/extension

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kura-${{ github.ref_name }}
          path: apps/extension/.output/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/extension/.output/*.zip
