name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-extension:
    name: Build & Release Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & zip Chrome extension
        run: pnpm --filter kura-extension zip

      - name: Build & zip Firefox extension
        run: pnpm --filter kura-extension zip:firefox

      - name: Sign Firefox extension via AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          FIREFOX_ZIP=$(ls apps/extension/.output/kura-extension-*-firefox.zip | head -1)
          pnpm --filter kura-extension exec web-ext sign \
            --source-dir apps/extension/.output/firefox-mv2 \
            --artifacts-dir apps/extension/.output/signed \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET" \
            --channel unlisted || true
          SIGNED_XPI=$(ls apps/extension/.output/signed/*.xpi 2>/dev/null | head -1)
          if [ -n "$SIGNED_XPI" ]; then
            cp "$SIGNED_XPI" "${FIREFOX_ZIP%.zip}.xpi"
          else
            echo "Signing failed or skipped, falling back to unsigned xpi"
            cp "$FIREFOX_ZIP" "${FIREFOX_ZIP%.zip}.xpi"
          fi

      - name: Package builds for sideloading
        run: |
          cd apps/extension/.output
          zip -r kura-chrome-sideload.zip chrome-mv3/
          zip -r kura-firefox-sideload.zip firefox-mv2/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(bash scripts/generate-changelog.sh "$GITHUB_REF_NAME")
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Downloads"
            echo ""
            echo "| Arquivo | Uso |"
            echo "|---|---|"
            echo "| \`kura-extension-${GITHUB_REF_NAME#v}-chrome.zip\` | Upload na Chrome Web Store |"
            echo "| \`kura-extension-${GITHUB_REF_NAME#v}-firefox.zip\` | Upload no Firefox Add-ons |"
            echo "| \`kura-extension-${GITHUB_REF_NAME#v}-firefox.xpi\` | Instalação direta no Firefox |"
            echo "| \`kura-chrome-sideload.zip\` | Sideload no Chrome (\`chrome://extensions\` → Carregar sem compactação) |"
            echo "| \`kura-firefox-sideload.zip\` | Sideload no Firefox (\`about:debugging\` → Carregar extensão temporária) |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kura v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            apps/extension/.output/kura-extension-*-chrome.zip
            apps/extension/.output/kura-extension-*-firefox.zip
            apps/extension/.output/kura-extension-*-firefox.xpi
            apps/extension/.output/kura-chrome-sideload.zip
            apps/extension/.output/kura-firefox-sideload.zip
          fail_on_unmatched_files: false
          overwrite: true
